# ============================================================
# 开发模式 docker-compose —— 热重载，改代码即生效
# 用法: docker compose -f docker-compose.dev.yml up -d
# ============================================================

services:
  # ── PostgreSQL 数据库（与生产一样）─────────────
  postgres:
    image: docker.m.daocloud.io/pgvector/pgvector:pg17
    container_name: ai-learning-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_learning}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-learning_platform}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_learning} -d ${POSTGRES_DB:-learning_platform}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_learning_network

  # ── FastAPI 后端 — 开发模式（热重载）──────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-learning-platform-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      # sandbox-worker:
      #   condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ai_learning}:${POSTGRES_PASSWORD:-dev_password_change_in_prod}@postgres:5432/${POSTGRES_DB:-learning_platform}
      ENVIRONMENT: development
      BACKEND_PORT: 8010
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-32-chars-xx}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SANDBOX_SERVICE_URL: http://sandbox-worker:8011/execute
    volumes:
      #  关键：挂载本地代码目录到容器内，uvicorn --reload 自动检测变更
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/scripts:/app/scripts
      - ./backend/config.toml:/app/config.toml:ro
      - backend_uploads:/app/uploads
    ports:
      - "${BACKEND_PORT:-8010}:8010"
    #  覆盖 CMD，启用 --reload 热重载
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8010", "--reload", "--log-level", "info" ]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=3).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    networks:
      - ai_learning_network

  # ── React 前端 — 开发模式（Vite dev server）──
  frontend:
    image: docker.m.daocloud.io/library/node:20-alpine
    container_name: ai-learning-platform-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    working_dir: /app
    volumes:
      #  关键：挂载整个前端项目，Vite HMR 秒级刷新
      - ./frontend:/app
      # 使用独立的 node_modules 卷，避免覆盖容器内依赖
      - frontend_node_modules:/app/node_modules
    environment:
      # Vite 需要监听 0.0.0.0 才能被外部访问
      HOST: "0.0.0.0"
      # API 代理指向后端容器
      VITE_BACKEND_TARGET: "http://backend:8010"
    # 先安装依赖，再启动 dev server
    command: sh -c "echo '>>> npm install starting...' && npm install --registry=https://registry.npmmirror.com --prefer-offline 2>&1 && echo '>>> Starting Vite dev server...' && npx vite --host 0.0.0.0 --port 5173"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://127.0.0.1:5173" ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s
    networks:
      - ai_learning_network

  # ── Admin 后台管理 — 开发模式（Vite dev server）──
  admin:
    image: docker.m.daocloud.io/library/node:20-alpine
    container_name: ai-learning-platform-admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    working_dir: /app
    volumes:
      #  关键：挂载整个 admin 项目，Vite HMR 秒级刷新
      - ./admin:/app
      # 使用独立的 node_modules 卷，避免覆盖容器内依赖
      - admin_node_modules:/app/node_modules
    environment:
      HOST: "0.0.0.0"
      VITE_BACKEND_TARGET: "http://backend:8010"
    # 先安装依赖，再启动 dev server
    command: sh -c "echo '>>> npm install starting...' && npm install --registry=https://registry.npmmirror.com --prefer-offline 2>&1 && echo '>>> Starting Admin Vite dev server...' && npx vite --host 0.0.0.0 --port 5174"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://127.0.0.1:5174/admin/" ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s
    networks:
      - ai_learning_network

  # ── Nginx 反向代理 — 开发模式 ────────────────
  nginx:
    image: docker.m.daocloud.io/library/nginx:alpine
    container_name: ai-learning-platform-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      admin:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      #  使用开发模式专用配置（代理到 Vite dev server）
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ai_learning_network

  sandbox-worker:
    build:
      context: ./backend/sandbox_worker
      dockerfile: Dockerfile
    container_name: ai-learning-platform-sandbox-worker
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=512m,exec
    environment:
      SANDBOX_WORKER_MEMORY_MB: 4096
      SANDBOX_WORKER_CPU_SECONDS: 120
      SANDBOX_WORKER_MAX_PROCESSES: 4096
      SANDBOX_WORKER_MAX_FILE_BYTES: 1048576
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8011/health', timeout=3).read()" ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 90s
    networks:
      - ai_learning_network

volumes:
  postgres_data:
    driver: local
    name: ai_learning_postgres_data
  backend_uploads:
    driver: local
    name: ai_learning_backend_uploads
  frontend_node_modules:
    driver: local
    name: ai_learning_frontend_node_modules
  admin_node_modules:
    driver: local
    name: ai_learning_admin_node_modules

networks:
  ai_learning_network:
    driver: bridge
    name: ai_learning_network
