services:
  # ── PostgreSQL 数据库 ─────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ai-learning-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ai_learning}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-learning_platform}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_learning} -d ${POSTGRES_DB:-learning_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_learning_network

  # ── FastAPI 后端 ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-learning-platform-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      sandbox-worker:
        condition: service_healthy
    environment:
      # 数据库连接（容器内网通信使用服务名 postgres 作为 host）
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ai_learning}:${POSTGRES_PASSWORD:-dev_password_change_in_prod}@postgres:5432/${POSTGRES_DB:-learning_platform}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      BACKEND_PORT: 8010
      # 安全配置
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-32-chars-xx}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # Redis（可选）
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SANDBOX_SERVICE_URL: http://sandbox-worker:8011/execute
    volumes:
      # 持久化上传文件
      - backend_uploads:/app/uploads
      # 挂载配置文件（可选，方便外部修改 LLM 配置等）
      - ./backend/config.toml:/app/config.toml:ro
    ports:
      - "${BACKEND_PORT:-8010}:8010"
    networks:
      - ai_learning_network

  sandbox-worker:
    build:
      context: ./backend/sandbox_worker
      dockerfile: Dockerfile
    container_name: ai-learning-platform-sandbox-worker
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=512m,exec
    environment:
      SANDBOX_WORKER_MEMORY_MB: 4096
      SANDBOX_WORKER_CPU_SECONDS: 120
      SANDBOX_WORKER_MAX_PROCESSES: 4096
      SANDBOX_WORKER_MAX_FILE_BYTES: 1048576
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8011/health')"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 90s
    networks:
      - ai_learning_network

  # ── React 前端（仅构建，产物输出到共享 volume）──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-learning-platform-frontend
    restart: "no"
    volumes:
      - frontend_dist:/output
    networks:
      - ai_learning_network

  # ── 后台管理系统（仅构建，产物输出到共享 volume）──
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: ai-learning-platform-admin
    restart: "no"
    volumes:
      - admin_dist:/output
    networks:
      - ai_learning_network

  # ── Nginx 反向代理 ────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ai-learning-platform-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_completed_successfully
      admin:
        condition: service_completed_successfully
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      # 从共享 volume 读取前端构建产物
      - frontend_dist:/usr/share/nginx/html:ro
      # 从共享 volume 读取后台管理系统构建产物
      - admin_dist:/usr/share/nginx/admin:ro
    networks:
      - ai_learning_network

volumes:
  postgres_data:
    driver: local
    name: ai_learning_postgres_data
  backend_uploads:
    driver: local
    name: ai_learning_backend_uploads
  frontend_dist:
    driver: local
    name: ai_learning_frontend_dist
  admin_dist:
    driver: local
    name: ai_learning_admin_dist

networks:
  ai_learning_network:
    driver: bridge
    name: ai_learning_network
